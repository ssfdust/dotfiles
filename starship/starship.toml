# Don't print a new line at the start of the prompt
add_newline = false

# Order of modules on prompt
format = """[](bg:#464347 fg:#AFD700)\
        $time\
        $username\
        $hostname\
        $directory\
        $aws\
        $gcloud\
        $singularity\
        $kubernetes\
        $docker_context\
        (↓ Source control - for right side ↓)\
        $hg_branch\
        $git_branch\
        $git_commit\
        $git_status\
        $git_state\
        (↑ Source control - for right side ↑)\
        (↓ Toolchain version modules ↓)\
        $crystal\
        $dart\
        $dotnet\
        $elixir\
        $elm\
        $erlang\
        $golang\
        $java\
        $julia\
        $nim\
        $nodejs\
        $ocaml\
        $perl\
        $php\
        $purescript\
        $python\
        $ruby\
        $rust\
        $swift\
        $terraform\
        $zig\
        (↑ Toolchain version modules ↑)\
        (↓ Package modules ↓)\
        $helm\
        $package\
        $cmake\
        $conda\
        (↑ Package modules ↑)\
        $nix_shell\
        $memory_usage\
        $env_var\
        $custom\
        (↑ above input line ↑)\
        $line_break\
        (↓ on input line ↓)\
        $battery\
        $shlvl\
        $jobs\
        $cmd_duration\
        $status\
        $character\
    """

# Generic prompt configurations
[character]
success_symbol = "[[](bg:#AFD700 fg:#464347)](fg:#AFD700)"
error_symbol = "[[](bg:#ff3322 fg:#464347)](fg:#ff3322)"
vicmd_symbol = "[[](bg:#6f6a70 fg:#464347)[](bg:#464347 fg:#6f6a70)](bold bg:#6f6a70 fg:#ff3322)"
format = "$symbol "

[line_break]
disabled = true

# Module configurations
[aws]
# disabled = true
symbol = " "
style = "bg:#EC912D"
format = '[[](bg:#EC912D fg:#464347)$symbol$profile(\($region\))[](bg:#464347 fg:#EC912D)]($style)'

[battery]
# disabled = true
full_symbol = ""
charging_symbol = " "
discharging_symbol = " "
unknown_symbol = ""
empty_symbol = ""
format = "[[](bg:#FF5511 fg:#464347)$symbol$percentage[](bg:#464347 fg:#FF5511)]($style)"
[[battery.display]]
threshold = 10
style = "bold bg:#FF5511 fg:#EEEEEE"
[[battery.display]]
threshold = 20
style = "bg:#FF5511 fg:#111111"

[cmake]
# disabled = true
# symbol = "卑" # alternate
symbol = "喝"
style = "bg:#064F8D fg:#EEEEEE"
format = "[[](bg:#064F8D fg:#464347)$symbol$version[](bg:#464347 fg:#064F8D)]($style)"

[cmd_duration]
# disabled = true
style = "bg:#464347 fg:#FBDE2D"
min_time = 2_000
show_milliseconds = true
show_notifications = false
min_time_to_notify = 45_000
format = "[ 祥$duration]($style)"

[conda]
# disabled = true
symbol = " "
style = "bg:#43B02A fg:#111111"
ignore_base = true
truncation_length = 1
format = "[[](bg:#43B02A fg:#464347)$symbol$environment[](bg:#464347 fg:#43B02A)]($style)"

[crystal]
# disabled = true
symbol = " "
style = "bg:#EEEEEE fg:#111111"
format = "[[](bg:#EEEEEE fg:#464347)$symbol$version[](bg:#464347 fg:#EEEEEE)]($style)"

[dart]
# disabled = true
symbol = " " # original
# symbol = "﯑ " # clearer
style = "bg:#32BBF9 fg:#111111"
format = "[[](bg:#32BBF9 fg:#464347)$symbol$version[](bg:#464347 fg:#32BBF9)]($style)"

[directory]
style = "italic bg:#6F6A70 fg:#EEEEEE"
read_only = ""
read_only_style = "bg:#ff3322 fg:#EEEEEE"
truncation_length = 4
truncate_to_repo = true
# truncation_symbol = "…"
# fish_style_pwd_dir_length = 3
format = "([[](bg:#ff3322 fg:#464347)$read_only[](bg:#464347 fg:#ff3322)]($read_only_style))[[](bg:#6F6A70 fg:#464347)$path[](bg:#464347 fg:#6F6A70)]($style)"

[directory.substitutions]
"~/Documents" = ""
"~/Music" = ""
"~/Movies" = ""
"~/Pictures" = ""
"~/Sources" = ""
"~" = " "
"/" = "  "

[docker_context]
